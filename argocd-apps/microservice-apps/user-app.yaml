apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: user-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/financial-system-project/GitOps.git
    targetRevision: HEAD
    path: charts/user
    helm:
      releaseName: user-service
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true